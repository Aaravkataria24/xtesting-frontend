[
build
]
  command = "npm run build"
  publish = "dist"

[
build.environment
]
  # Use a Python version compatible with your dependencies
  PYTHON_VERSION = "3.9"
  NODE_VERSION = "16" # Adjust this to match your node version

[[
redirects
]]
  from = "/api/*"
  to = "https://your-gcp-backend-url.com/api/:splat"
  status = 200
  force = true

[[
redirects
]]
  from = "/*"
  to = "/index.html"
  status = 200